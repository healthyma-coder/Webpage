<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Healthyma | Product Details</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="market-page">
  <header class="market-header">
    <a class="market-logo" href="home.html"><img src="images/healthyma-logo-premium.jpeg" alt="Healthyma The Pure"></a>
    <a class="market-location" href="location.html">
      <strong>Add your location</strong>
      <span>To see delivery options near you</span>
    </a>
    <form class="market-search" action="products.html">
      <input name="q" placeholder='Search for "Moringa"'>
      <button type="submit" aria-label="Search">Search</button>
    </form>
    <a class="market-sign" href="products.html">Shop</a>
    <a class="market-cart" href="cart.html">My Cart</a>
  </header>

  <main class="market-main">
    <div id="productDetailsRoot" class="product-detail-shell">
      <p>Loading product...</p>
    </div>
  </main>

  <div class="floating-bar" id="floatingBar"><div><strong id="cartCount">0 items</strong><span id="cartSubtotal">Rs.0</span></div><button id="goToCartBtn">View Cart</button></div>
  <footer>Copyright 2026 Healthyma Foods.</footer>
  <script src="js/config.js"></script>
  <script src="js/cart-utils.js"></script>
  <script src="js/location-display.js"></script>
  <script src="js/product-details.js"></script>
</body>
</html>
